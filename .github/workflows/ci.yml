name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  portable-python:
    name: Python (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-2025
          - ubuntu-24.04
          - macos-15
    steps:
      - name: Check out source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install package
        run: python -m pip install --disable-pip-version-check -e ".[dev]"

      - name: Lint
        run: python -m ruff check --no-cache src tests

      - name: Type-check portable capability seam
        run: python -m mypy src/localai/hwcaps.py

      - name: Type-check all source on its supported Windows host
        if: runner.os == 'Windows'
        run: python -m mypy src tests/test_hwcaps_behavior.py

      - name: Run full supported-host tests
        if: runner.os == 'Windows'
        run: python -m pytest -q

      - name: Run portable synthetic tests
        if: runner.os != 'Windows'
        run: python -m pytest -q tests/test_hwcaps_behavior.py

      - name: Enforce public-readiness boundary
        if: runner.os == 'Linux'
        run: python -m localai public-audit --strict

      - name: Check whitespace
        if: runner.os == 'Linux'
        run: git diff --check

  windows-scripts:
    name: Windows operational gate
    runs-on: windows-2025
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: '24'

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install package
        shell: pwsh
        run: python -m pip install --disable-pip-version-check -e ".[dev]"

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -RequiredVersion 1.24.0 -Scope CurrentUser -Force

      - name: Run operational verification
        shell: pwsh
        run: ./tests/Invoke-Checks.ps1

  dependency-review:
    name: Dependency review
    # GitHub reports this repository's Dependency Graph as disabled. The owner
    # can enable it, then set DEPENDENCY_REVIEW_ENABLED=true to activate this
    # fail-closed job without another workflow edit.
    if: >-
      github.event_name == 'pull_request' &&
      vars.DEPENDENCY_REVIEW_ENABLED == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Review dependency changes
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: moderate

  secrets:
    name: Secret history
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out full history
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          fetch-depth: 0

      - name: Scan with Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
