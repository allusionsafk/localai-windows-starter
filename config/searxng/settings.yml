# localai SearXNG — quality-optimized search config.
# Merges over SearXNG defaults (use_default_settings: true).
# The container entrypoint substitutes __SEARXNG_SECRET__ from .env on first boot.
use_default_settings: true

server:
  secret_key: "__SEARXNG_SECRET__"

search:
  safe_search: 0
  autocomplete: "duckduckgo"
  default_lang: "en"
  formats:
    - html
    - json

# Source-quality tuning: boost trusted, low-spam sources so authoritative
# answers rank to the top (SearXNG multiplies each engine's score by weight).
engines:
  - name: wikipedia
    weight: 3.0
  - name: wikidata
    weight: 2.5
  - name: arxiv
    weight: 2.2
  - name: duckduckgo
    weight: 2.0
  - name: brave
    weight: 2.0
  - name: google
    weight: 1.8
  - name: startpage
    weight: 1.6
  - name: bing
    weight: 1.5
  - name: qwant
    weight: 1.3
  - name: github
    weight: 1.6
